name: Kernel branch mirror

on:
  workflow_dispatch:
    inputs:
      branch_filter:
        description: Optional shell glob to limit mirrored branches, for example android14-6.1* or deprecated/android14-6.1*
        required: false
        default: ''
        type: string
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config fetch.output full

      - name: Mirror hardcoded kernel branches
        shell: bash
        env:
          SOURCE_REPO: https://android.googlesource.com/kernel/common
          BRANCH_FILTER: ${{ inputs.branch_filter }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          set -x
          shopt -s extglob nullglob

          PATTERNS=(
            'refs/heads/android12-5.10*'
            'refs/heads/android13-5.10*'
            'refs/heads/android13-5.15*'
            'refs/heads/android14-5.15*'
            'refs/heads/android14-6.1*'
            'refs/heads/android15-6.6*'
            'refs/heads/android16-6.12*'
            'refs/heads/deprecated/android12-5.10*'
            'refs/heads/deprecated/android13-5.10*'
            'refs/heads/deprecated/android13-5.15*'
            'refs/heads/deprecated/android14-5.15*'
            'refs/heads/deprecated/android14-6.1*'
            'refs/heads/deprecated/android15-6.6*'
            'refs/heads/deprecated/android16-6.12*'
          )

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$SOURCE_REPO"

          echo "::notice::Scanning upstream branches from $SOURCE_REPO"
          MATCHED_BRANCHES=()

          for pattern in "${PATTERNS[@]}"; do
            echo "::group::Pattern $pattern"
            while IFS=$'\t' read -r sha ref; do
              [[ -z "${ref:-}" ]] && continue
              branch="${ref#refs/heads/}"
              if [[ -n "$BRANCH_FILTER" && "$branch" != $BRANCH_FILTER ]]; then
                continue
              fi
              echo "Matched ref $ref at $sha"
              MATCHED_BRANCHES+=("$branch")
            done < <(git ls-remote --branches "$SOURCE_REPO" "$pattern")
            echo "::endgroup::"
          done

          if [[ ${#MATCHED_BRANCHES[@]} -eq 0 ]]; then
            echo "No branches matched."
            exit 1
          fi

          mapfile -t MATCHED_BRANCHES < <(printf '%s\n' "${MATCHED_BRANCHES[@]}" | sort -u)

          total=${#MATCHED_BRANCHES[@]}
          echo "::notice::Found $total branch(es) to mirror"
          printf '%s\n' "${MATCHED_BRANCHES[@]}"

          done_count=0
          for branch in "${MATCHED_BRANCHES[@]}"; do
            done_count=$((done_count + 1))
            echo "::group::[$done_count/$total] $branch"
            git fetch --verbose --progress --no-tags upstream \
              "+refs/heads/${branch}:refs/remotes/upstream/${branch}"
            git push --verbose --progress origin \
              "refs/remotes/upstream/${branch}:refs/heads/${branch}" \
              --force
            echo "::endgroup::"
          done

          echo "::notice::Checking for stale managed branches to delete"
          mapfile -t REMOTE_BRANCHES < <(
            git ls-remote --branches "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" \
              | awk '{print $2}' \
              | sed 's#refs/heads/##'
          )

          deleted_count=0
          for remote_branch in "${REMOTE_BRANCHES[@]}"; do
            managed=false
            for pattern in "${PATTERNS[@]}"; do
              shell_pattern="${pattern#refs/heads/}"
              if [[ "$remote_branch" == $shell_pattern ]]; then
                managed=true
                break
              fi
            done

            if [[ "$managed" == false ]]; then
              continue
            fi

            keep=false
            for wanted in "${MATCHED_BRANCHES[@]}"; do
              if [[ "$remote_branch" == "$wanted" ]]; then
                keep=true
                break
              fi
            done

            if [[ "$keep" == false ]]; then
              deleted_count=$((deleted_count + 1))
              git push --verbose origin --delete "$remote_branch"
            fi
          done

          {
            echo "### Mirror result"
            echo ""
            echo "Mirrored branches: $total"
            echo "Deleted stale managed branches: $deleted_count"
            echo ""
            echo "### Branches mirrored"
            for branch in "${MATCHED_BRANCHES[@]}"; do
              echo "- $branch"
            done
          } >> "$GITHUB_STEP_SUMMARY"