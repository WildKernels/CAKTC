name: Kernel latest single commit only

'on':
  workflow_dispatch:
    inputs:
      branch_filter:
        description: "Branch glob filter, for example android14-6.1*"
        required: true
        default: ""
        type: string

permissions:
  contents: write

jobs:
  mirror_latest_tip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config gc.auto 0

      - name: Mirror latest commit only
        shell: bash
        env:
          SOURCE_REPO: https://android.googlesource.com/kernel/common
          BRANCH_FILTER: ${{ inputs.branch_filter }}
        run: |
          set -Eeuo pipefail
          set -x

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$SOURCE_REPO"

          MATCHED_BRANCHES=()
          while IFS=$'\t' read -r sha ref; do
            [[ -z "${ref:-}" ]] && continue
            branch="${ref#refs/heads/}"
            MATCHED_BRANCHES+=("$branch")
          done < <(git ls-remote --branches "$SOURCE_REPO" "$BRANCH_FILTER")

          if [[ ${#MATCHED_BRANCHES[@]} -eq 0 ]]; then
            echo "No branches matched filter: $BRANCH_FILTER"
            exit 1
          fi

          mapfile -t MATCHED_BRANCHES < <(printf '%s\n' "${MATCHED_BRANCHES[@]}" | sort -u)

          echo "Matched ${#MATCHED_BRANCHES[@]} branches"

          for branch in "${MATCHED_BRANCHES[@]}"; do
            echo "::group::Processing $branch"

            git update-ref -d "refs/remotes/upstream/$branch" 2>/dev/null || true

            git fetch --depth=1 --no-tags upstream \
              "+refs/heads/$branch:refs/remotes/upstream/$branch"

            tip_sha=$(git rev-parse "refs/remotes/upstream/$branch")
            fetched_count=$(git rev-list --count "refs/remotes/upstream/$branch" || echo 0)

            echo "Fetched $fetched_count commit(s) from $branch"
            echo "Pushing tip $tip_sha to origin/$branch"

            git push --force origin \
              "$tip_sha:refs/heads/$branch"

            git update-ref -d "refs/remotes/upstream/$branch" 2>/dev/null || true
            git reflog expire --expire=now --all || true
            git gc --prune=now || true

            echo "::endgroup::"
          done

          {
            echo "### Latest single-commit mirror complete"
            echo ""
            echo "Filter: $BRANCH_FILTER"
            echo "Branches processed: ${#MATCHED_BRANCHES[@]}"
            echo ""
            echo "Processed branches:"
            for branch in "${MATCHED_BRANCHES[@]}"; do
              echo "- $branch"
            done
          } >> "$GITHUB_STEP_SUMMARY"