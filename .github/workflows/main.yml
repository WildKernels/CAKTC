name: Kernel adaptive push all branches

'on':
  workflow_dispatch:
    inputs:
      branch_filter:
        description: "Optional shell glob to limit matched branches"
        required: false
        default: ""
        type: string
      target_gib:
        description: "Target estimated size per push chunk in GiB"
        required: false
        default: "1.0"
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config fetch.output full

      - name: Adaptive size push
        shell: bash
        env:
          SOURCE_REPO: https://android.googlesource.com/kernel/common
          BRANCH_FILTER: ${{ inputs.branch_filter }}
          TARGET_GIB: ${{ inputs.target_gib }}
        run: |
          set -Eeuo pipefail
          set -x
          shopt -s extglob nullglob

          TARGET_BYTES=$(awk "BEGIN {printf \"%.0f\", ${TARGET_GIB} * 1024 * 1024 * 1024}")

          PATTERNS=(
            'refs/heads/android12-5.10*'
            'refs/heads/android13-5.10*'
            'refs/heads/android13-5.15*'
            'refs/heads/android14-5.15*'
            'refs/heads/android14-6.1*'
            'refs/heads/android15-6.6*'
            'refs/heads/android16-6.12*'
            'refs/heads/deprecated/android12-5.10*'
            'refs/heads/deprecated/android13-5.10*'
            'refs/heads/deprecated/android13-5.15*'
            'refs/heads/deprecated/android14-5.15*'
            'refs/heads/deprecated/android14-6.1*'
            'refs/heads/deprecated/android15-6.6*'
            'refs/heads/deprecated/android16-6.12*'
          )

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$SOURCE_REPO"

          MATCHED_BRANCHES=()
          for pattern in "${PATTERNS[@]}"; do
            while IFS=$'\t' read -r sha ref; do
              [[ -z "${ref:-}" ]] && continue
              branch="${ref#refs/heads/}"
              if [[ -n "$BRANCH_FILTER" && "$branch" != $BRANCH_FILTER ]]; then
                continue
              fi
              MATCHED_BRANCHES+=("$branch")
            done < <(git ls-remote --branches "$SOURCE_REPO" "$pattern")
          done

          if [[ ${#MATCHED_BRANCHES[@]} -eq 0 ]]; then
            echo "No branches matched."
            exit 1
          fi

          mapfile -t MATCHED_BRANCHES < <(printf '%s\n' "${MATCHED_BRANCHES[@]}" | sort -u)

          estimate_pack_size() {
            local old_ref="$1"
            local new_ref="$2"
            local tmpdir
            local outfile

            tmpdir="$(mktemp -d)"
            outfile="$tmpdir/pack"

            if [[ -n "$old_ref" ]]; then
              git rev-list --objects "$new_ref" "^$old_ref" | git pack-objects --stdout --revs "$outfile" >/dev/null 2>/dev/null || true
            else
              git rev-list --objects "$new_ref" | git pack-objects --stdout --revs "$outfile" >/dev/null 2>/dev/null || true
            fi

            local size=0
            if compgen -G "${outfile}-*.pack" > /dev/null; then
              size=$(du -cb "${outfile}"-*.pack | tail -n1 | awk '{print $1}')
            fi

            rm -rf "$tmpdir"
            echo "$size"
          }

          total_branches=${#MATCHED_BRANCHES[@]}
          current_branch_index=0

          for branch in "${MATCHED_BRANCHES[@]}"; do
            current_branch_index=$((current_branch_index + 1))
            echo "::group::[$current_branch_index/$total_branches] Mirroring $branch"

            git fetch --verbose --progress --no-tags upstream \
              "+refs/heads/${branch}:refs/remotes/upstream/${branch}"

            mapfile -t COMMITS < <(git rev-list --reverse "refs/remotes/upstream/${branch}")
            TOTAL=${#COMMITS[@]}

            if [[ "$TOTAL" -eq 0 ]]; then
              echo "No commits found for branch $branch"
              echo "::endgroup::"
              continue
            fi

            low=0
            remote_tip=""
            step=1

            while [[ "$low" -lt "$TOTAL" ]]; do
              left=$low
              right=$((TOTAL - 1))
              best=-1
              best_size=0

              while [[ "$left" -le "$right" ]]; do
                mid=$(((left + right) / 2))
                candidate="${COMMITS[$mid]}"
                size=$(estimate_pack_size "$remote_tip" "$candidate")
                gib=$(awk "BEGIN {printf \"%.3f\", ${size} / 1024 / 1024 / 1024}")

                echo "Branch $branch test step $step: commit $((mid + 1))/$TOTAL => ${candidate} estimated ${gib} GiB"

                if [[ "$size" -gt 0 && "$size" -le "$TARGET_BYTES" ]]; then
                  best=$mid
                  best_size=$size
                  left=$((mid + 1))
                else
                  right=$((mid - 1))
                fi
              done

              if [[ "$best" -lt "$low" ]]; then
                best=$low
                best_commit="${COMMITS[$best]}"
                best_size=$(estimate_pack_size "$remote_tip" "$best_commit")
                gib=$(awk "BEGIN {printf \"%.3f\", ${best_size} / 1024 / 1024 / 1024}")
                echo "Branch $branch no chunk under target found, forcing single-commit advance at ${best_commit} estimated ${gib} GiB"
              fi

              best_commit="${COMMITS[$best]}"
              best_gib=$(awk "BEGIN {printf \"%.3f\", ${best_size} / 1024 / 1024 / 1024}")
              echo "Branch $branch pushing through commit $((best + 1))/$TOTAL => ${best_commit} estimated ${best_gib} GiB"

              git push --verbose --progress origin \
                "+${best_commit}:refs/heads/${branch}"

              remote_tip="$best_commit"
              low=$((best + 1))
              step=$((step + 1))
            done

            echo "Branch $branch final exact tip push"
            git push --verbose --progress origin \
              "+refs/remotes/upstream/${branch}:refs/heads/${branch}"

            echo "::endgroup::"
          done

          {
            echo "### Adaptive push result"
            echo ""
            echo "Matched branches: ${#MATCHED_BRANCHES[@]}"
            echo "Target size per push: $TARGET_GIB GiB"
            echo ""
            echo "### Branches processed"
            for branch in "${MATCHED_BRANCHES[@]}"; do
              echo "- $branch"
            done
          } >> "$GITHUB_STEP_SUMMARY"