name: Kernel chunked history mirror

on:
  workflow_dispatch:
    inputs:
      branch_filter:
        description: Optional shell glob to limit mirrored branches, for example android14-6.1* or deprecated/android14-6.1*
        required: false
        default: ''
        type: string
      chunk_commits:
        description: Number of commits per history chunk push
        required: false
        default: '250'
        type: string
  schedule:
    - cron: '31 6 * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config fetch.output full

      - name: Chunked mirror hardcoded kernel branches
        shell: bash
        env:
          SOURCE_REPO: https://android.googlesource.com/kernel/common
          BRANCH_FILTER: ${{ inputs.branch_filter }}
          CHUNK_COMMITS: ${{ inputs.chunk_commits }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          set -x
          shopt -s extglob nullglob

          PATTERNS=(
            'refs/heads/android12-5.10*'
            'refs/heads/android13-5.10*'
            'refs/heads/android13-5.15*'
            'refs/heads/android14-5.15*'
            'refs/heads/android14-6.1*'
            'refs/heads/android15-6.6*'
            'refs/heads/android16-6.12*'
            'refs/heads/deprecated/android12-5.10*'
            'refs/heads/deprecated/android13-5.10*'
            'refs/heads/deprecated/android13-5.15*'
            'refs/heads/deprecated/android14-5.15*'
            'refs/heads/deprecated/android14-6.1*'
            'refs/heads/deprecated/android15-6.6*'
            'refs/heads/deprecated/android16-6.12*'
          )

          if ! [[ "$CHUNK_COMMITS" =~ ^[0-9]+$ ]] || [[ "$CHUNK_COMMITS" -le 0 ]]; then
            echo "chunk_commits must be a positive integer"
            exit 1
          fi

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$SOURCE_REPO"

          MATCHED_BRANCHES=()
          for pattern in "${PATTERNS[@]}"; do
            echo "::group::Pattern $pattern"
            while IFS=$'\t' read -r sha ref; do
              [[ -z "${ref:-}" ]] && continue
              branch="${ref#refs/heads/}"
              if [[ -n "$BRANCH_FILTER" && "$branch" != $BRANCH_FILTER ]]; then
                continue
              fi
              echo "Matched ref $ref at $sha"
              MATCHED_BRANCHES+=("$branch")
            done < <(git ls-remote --branches "$SOURCE_REPO" "$pattern")
            echo "::endgroup::"
          done

          if [[ ${#MATCHED_BRANCHES[@]} -eq 0 ]]; then
            echo "No branches matched."
            exit 1
          fi

          mapfile -t MATCHED_BRANCHES < <(printf '%s\n' "${MATCHED_BRANCHES[@]}" | sort -u)

          total_branches=${#MATCHED_BRANCHES[@]}
          mirrored_count=0

          for branch in "${MATCHED_BRANCHES[@]}"; do
            mirrored_count=$((mirrored_count + 1))
            echo "::group::[$mirrored_count/$total_branches] Mirroring $branch"

            git fetch --verbose --progress --no-tags upstream \
              "+refs/heads/${branch}:refs/remotes/upstream/${branch}"

            mapfile -t commits < <(git rev-list --reverse "refs/remotes/upstream/${branch}")
            commit_count=${#commits[@]}
            echo "Branch $branch has $commit_count commit(s)"

            if [[ "$commit_count" -eq 0 ]]; then
              echo "No commits found for $branch"
              echo "::endgroup::"
              continue
            fi

            temp_branch="chunk-tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            git branch -D "$temp_branch" 2>/dev/null || true
            git checkout --detach "${commits[0]}"
            git branch "$temp_branch"

            i=0
            chunk_index=0
            while [[ "$i" -lt "$commit_count" ]]; do
              end=$((i + CHUNK_COMMITS - 1))
              if [[ "$end" -ge "$commit_count" ]]; then
                end=$((commit_count - 1))
              fi

              chunk_index=$((chunk_index + 1))
              target_commit="${commits[$end]}"
              echo "Pushing chunk $chunk_index for $branch ending at $target_commit (commit index $((end + 1))/$commit_count)"

              git update-ref "refs/heads/$temp_branch" "$target_commit"
              git push --verbose --progress origin \
                "+refs/heads/${temp_branch}:refs/heads/${branch}"

              i=$((end + 1))
            done

            echo "Final force push of exact upstream tip for $branch"
            git push --verbose --progress origin \
              "+refs/remotes/upstream/${branch}:refs/heads/${branch}"

            git branch -D "$temp_branch" 2>/dev/null || true
            echo "::endgroup::"
          done

          {
            echo "### Chunked mirror result"
            echo ""
            echo "Branches mirrored: $total_branches"
            echo "Chunk size: $CHUNK_COMMITS commit(s)"
            echo ""
            echo "### Branches mirrored"
            for branch in "${MATCHED_BRANCHES[@]}"; do
              echo "- $branch"
            done
          } >> "$GITHUB_STEP_SUMMARY"